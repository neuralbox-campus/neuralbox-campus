# NeuralBox Campus — Nginx Production Config
# Place in /etc/nginx/sites-available/campus.neuralboxai.com

server {
    listen 80;
    server_name campus.neuralboxai.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name campus.neuralboxai.com;

    # SSL (certbot will add these)
    # ssl_certificate /etc/letsencrypt/live/campus.neuralboxai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/campus.neuralboxai.com/privkey.pem;

    root /var/www/neuralbox-campus/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API proxy to backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets with cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
